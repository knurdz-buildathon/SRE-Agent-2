services:
  sre-agent-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sre-agent-api
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sre-data:/data
      - ./traefik-logs:/traefik-logs:ro
      - ./user-logs:/user-logs:ro
      # VPS scan: read-only host mounts for ss/netstat, Nginx/Apache config parsing
      - /etc:/host-etc:ro
      - /proc:/host-proc:ro
      - /usr:/host-usr:ro
      - /var:/host-var:ro
    environment:
      - DATABASE_PATH=/data/sre.db
      - TRAEFIK_LOG_DIR=/traefik-logs
      - USER_LOG_DIR=/user-logs
      - DOCKER_SOCKET=/var/run/docker.sock
      - CHECK_INTERVAL=30
      - DASHBOARD_USER=admin
      - DASHBOARD_PASS=admin
      - DEMO_MODE=false
      - AUTO_DISCOVER_WEB=true
      - PROBE_HOST=host.docker.internal
      - SRE_AGENT_CONTAINER_NAME=sre-agent-api
      - AUTO_DISCOVER_SKIP_CONTAINERS=sre-agent-api,sre-agent-web
      - VPS_SCAN_ENABLED=true
      - HTTP_AVAILABILITY_MODE=reachable
      - HTTP_TRY_HTTPS_FALLBACK=true
      - HEALTH_DOWN_AFTER_FAILURES=3
      - LOG_MAX_BYTES_PER_FILE=2000000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  sre-agent-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sre-agent-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      sre-agent-api:
        condition: service_healthy

  sample-healthy:
    profiles:
      - demo
    build:
      context: ./sample-healthy
      dockerfile: Dockerfile
    container_name: sample-healthy-app
    restart: unless-stopped
    labels:
      sre.monitor: "true"
      sre.slug: "sample-healthy"
      sre.environment: "production"
      sre.health_url: "http://sample-healthy-app:8080/health"
      sre.browser_url: "http://sample-healthy-app:8080"
      sre.expected_selector: "#app"
      sre.tcp_checks: "sample-healthy-app:8080"
    ports:
      - "8081:8080"

  sample-crash:
    profiles:
      - demo
    build:
      context: ./sample-crash
      dockerfile: Dockerfile
    container_name: sample-crash-app
    restart: unless-stopped
    labels:
      sre.monitor: "true"
      sre.slug: "sample-crash"
      sre.environment: "production"
      sre.health_url: "http://sample-crash-app:3000/health"
      sre.browser_url: "http://sample-crash-app:3000"
      sre.expected_selector: "#root"
      sre.tcp_checks: "sample-crash-app:3000"

volumes:
  sre-data:
